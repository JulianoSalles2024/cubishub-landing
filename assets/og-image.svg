<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Cubis.Hub">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E211F"/>
      <stop offset="100%" stop-color="#282C29"/>
    </linearGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3DDA85"/>
      <stop offset="100%" stop-color="#2ECC71"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="rgba(46,204,113,0.28)"/>
      <stop offset="100%" stop-color="rgba(46,204,113,0)"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="rgba(255,255,255,0.06)"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo -->
  <g transform="translate(80,72)">
    <rect x="0" y="0" width="64" height="64" rx="13" fill="#282C29" stroke="rgba(106,132,129,0.3)"/>
    <g transform="translate(8,8) scale(0.62)">
      <polygon points="18,26 40,37 40,59 18,48" fill="#3D4240"/>
      <polygon points="62,26 62,48 40,59 40,37" fill="#6A8481"/>
      <polygon points="40,15 62,26 40,37 18,26" fill="url(#tg)"/>
    </g>
    <text x="84" y="44" font-family="Inter, sans-serif" font-size="34" font-weight="700" letter-spacing="-0.025em">
      <tspan fill="#F0F2F1">Cubis</tspan><tspan fill="#2ECC71">.Hub</tspan>
    </text>
  </g>

  <!-- Headline -->
  <text x="80" y="320" font-family="Inter, sans-serif" font-size="76" font-weight="800" letter-spacing="-0.03em" fill="#F0F2F1">Gestão contábil</text>
  <text x="80" y="408" font-family="Inter, sans-serif" font-size="76" font-weight="800" letter-spacing="-0.03em">
    <tspan fill="#3DDA85">que realmente</tspan><tspan fill="#F0F2F1"> funciona.</tspan>
  </text>

  <!-- Subline -->
  <text x="82" y="470" font-family="Inter, sans-serif" font-size="29" font-weight="400" fill="#C3D0CC">WhatsApp por setor · disparo de relatórios em massa · prazos fiscais</text>

  <!-- Chips -->
  <g font-family="Inter, sans-serif" font-size="22" font-weight="600">
    <rect x="80" y="520" width="232" height="52" rx="26" fill="rgba(46,204,113,0.12)" stroke="rgba(46,204,113,0.3)"/>
    <text x="112" y="553" fill="#3DDA85">✓ 7 dias grátis</text>
    <rect x="332" y="520" width="262" height="52" rx="26" fill="rgba(46,204,113,0.12)" stroke="rgba(46,204,113,0.3)"/>
    <text x="364" y="553" fill="#3DDA85">✓ White Label real</text>
  </g>
</svg>
